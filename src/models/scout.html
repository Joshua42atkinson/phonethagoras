<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Scout | Phonethagoras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <style>
    :root {
      --scout-green: #2ecc71;
      --scout-green-glow: rgba(46, 204, 113, 0.4);
      --scout-dark: #0a1410;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--scout-dark);
      background-image: radial-gradient(circle at center, #11221a 0%, #050a08 100%);
      color: var(--scout-green);
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Mock Camera Feed Background */
    .camera-feed {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 0;
    }

    .camera-feed::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw; height: 60vw;
      max-width: 400px; max-height: 400px;
      border: 2px solid rgba(46, 204, 113, 0.3);
      border-radius: 50%;
      box-shadow: 0 0 50px rgba(46, 204, 113, 0.1) inset;
    }

    /* HUD Elements */
    .hud-header {
      position: relative;
      z-index: 10;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(10,20,16,0.9), transparent);
    }

    .nav-back {
      color: var(--scout-green);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 5px var(--scout-green-glow);
    }

    .hud-status {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 0.8rem;
    }
    
    .status-dot {
      width: 8px; height: 8px;
      background-color: var(--scout-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--scout-green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; box-shadow: 0 0 8px var(--scout-green); }
      50% { opacity: 0.4; box-shadow: 0 0 2px var(--scout-green); }
      100% { opacity: 1; box-shadow: 0 0 8px var(--scout-green); }
    }

    /* Viewfinder Reticle */
    .reticle {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      z-index: 5;
      pointer-events: none;
    }
    
    .reticle::before, .reticle::after {
      content: '';
      position: absolute;
      background: var(--scout-green);
      box-shadow: 0 0 5px var(--scout-green-glow);
    }
    
    .reticle::before { top: 50%; left: 40%; right: 40%; height: 1px; }
    .reticle::after { left: 50%; top: 40%; bottom: 40%; width: 1px; }
    
    .reticle-corner {
      position: absolute;
      width: 30px; height: 30px;
      border-color: var(--scout-green);
      border-style: solid;
      box-shadow: 0 0 10px var(--scout-green-glow) inset;
    }
    .corner-tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .corner-tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    /* Analysis Panel */
    .analysis-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(10, 20, 16, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(46, 204, 113, 0.3);
      padding: 1.5rem;
      z-index: 10;
      transform: translateY(0);
      transition: transform 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Orbitron', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px dashed rgba(46, 204, 113, 0.3);
      padding-bottom: 0.5rem;
    }

    .analysis-log {
      height: 120px;
      overflow-y: auto;
      font-size: 0.85rem;
      color: #a8ccb6;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-entry {
      display: flex;
      gap: 10px;
    }
    .log-time { color: var(--scout-green); opacity: 0.7; }

    .action-bar {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .btn-tactical {
      flex: 1;
      background: rgba(46, 204, 113, 0.1);
      border: 1px solid var(--scout-green);
      color: var(--scout-green);
      padding: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 10px rgba(46, 204, 113, 0.1) inset;
    }

    .btn-tactical:hover {
      background: var(--scout-green);
      color: var(--scout-dark);
      box-shadow: 0 0 15px var(--scout-green-glow);
    }

  </style>
</head>
<body>

  <!-- Mock Environment Feed -->
  <div class="camera-feed"></div>

  <!-- HUD Header -->
  <header class="hud-header">
    <a href="../models.html" class="nav-back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Abort
    </a>
    <div class="hud-status">
      <span style="font-family: 'Orbitron';">JANUS-PRO 1B (GGUF)</span>
      <div class="status-dot"></div>
      <span>SYS.ONLINE</span>
    </div>
  </header>

  <!-- Center Viewfinder -->
  <div class="reticle">
    <div class="reticle-corner corner-tl"></div>
    <div class="reticle-corner corner-tr"></div>
    <div class="reticle-corner corner-bl"></div>
    <div class="reticle-corner corner-br"></div>
  </div>

  <!-- Bottom Analysis Panel -->
  <div class="analysis-panel">
    <div class="panel-header">
      <span>Target Analysis Log</span>
      <span style="font-size: 0.7rem;">MEM: 1024MB ALLOCATED</span>
    </div>
    
    <div class="analysis-log">
      <div class="log-entry">
        <span class="log-time">[00:01]</span>
        <span class="log-text">Initializing Vision Systems...</span>
      </div>
      <div class="log-entry">
        <span class="log-time">[00:02]</span>
        <span class="log-text">Hardware target acquired. Awaiting visual input.</span>
      </div>
      <div class="log-entry">
        <span class="log-time">[00:03]</span>
        <span class="log-text">Ready to identify flora, terrain hazards, or resources.</span>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-tactical">Capture Frame</button>
      <button class="btn-tactical" style="flex: 0.5;">Toggle IR</button>
    </div>
  </div>

  <script>
    const captureBtn = document.querySelector('.btn-tactical');
    const logFeed = document.querySelector('.analysis-log');
    captureBtn.addEventListener('click', () => {
      // Flash effect
      const flash = document.createElement('div');
      flash.style.position = 'absolute';
      flash.style.inset = '0';
      flash.style.backgroundColor = 'white';
      flash.style.zIndex = '999';
      flash.style.opacity = '1';
      flash.style.transition = 'opacity 0.5s ease-out';
      document.body.appendChild(flash);
      setTimeout(() => flash.style.opacity = '0', 50);
      setTimeout(() => flash.remove(), 550);
      
      // Add log
      const timeStr = `[00:0${Math.floor(Math.random()*9)+4}]`;
      const msgs = [
        "Image captured. Scanning for known flora...",
        "Object detected: Fungi (Confidence 88%). Warning: Do not consume.",
        "Terrain mapped. Elevation change ahead.",
        "Analyzing ambient light levels..."
      ];
      const newLog = document.createElement('div');
      newLog.className = 'log-entry';
      newLog.innerHTML = `<span class="log-time">${timeStr}</span> <span class="log-text">${msgs[Math.floor(Math.random()*msgs.length)]}</span>`;
      logFeed.appendChild(newLog);
      logFeed.scrollTop = logFeed.scrollHeight;
    });
  </script>
</body>
</html>
