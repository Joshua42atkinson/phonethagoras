<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Subtle radial glow behind the pentagon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="hsl(38, 92%, 56%)" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="hsl(38, 92%, 56%)" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient for the pentagon stroke -->
    <linearGradient id="pentStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(38, 92%, 66%)"/>
      <stop offset="100%" stop-color="hsl(38, 92%, 46%)"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="hsl(38, 92%, 56%)" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#0a0f19"/>

  <!-- Glow circle -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Pentagon with glow shadow -->
  <polygon
    points="256,72 432,200 365,404 147,404 80,200"
    fill="none"
    stroke="url(#pentStroke)"
    stroke-width="8"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />

  <!-- Inner pentagon outline (subtle depth) -->
  <polygon
    points="256,100 410,214 352,388 160,388 102,214"
    fill="none"
    stroke="hsl(38, 92%, 56%)"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.2"
  />

  <!-- Phi symbol -->
  <text
    x="256" y="296"
    font-size="192"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="400"
    text-anchor="middle"
    fill="hsl(38, 92%, 56%)"
    filter="url(#shadow)"
  >Φ</text>
</svg>
